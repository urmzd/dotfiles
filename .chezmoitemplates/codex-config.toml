# ---------------------------------------------------------------------------
# Codex base config (~/.codex/config.toml via chezmoi dot_ prefix).
# Loaded for every `codex` session unless overridden by `codex --profile <name>`.
#
# Mode: FULL ACCESS -- sandbox_mode = "danger-full-access" +
# approval_policy = "never". No OS seatbelt, no approval prompts: Codex runs
# every command unsandboxed, like Claude Code's --dangerously-skip-permissions
# made the default. Deliberate choice (2026-06): the workspace-write seatbelt
# blocked too many meaningful changes (.git writes, installs, out-of-workspace
# edits). The guardian/auto_review and [sandbox_workspace_write] sections below
# are INERT for base sessions but kept because profile overlays (writer/
# reviewer/plan/guardian) merge onto this file and still use them.
# Ref: https://developers.openai.com/codex/agent-approvals-security
#
# Drop to a read-only profile (`codex --profile reviewer` or `--profile plan`)
# for inspection-only work where no write should ever happen.
#
# approvals_reviewer enum (per official docs):
#   "user"        human in the loop on every escalation
#   "auto_review" canonical name for the guardian-subagent reviewer (USE THIS)
# The legacy alias "guardian_subagent" still validates under --strict-config but
# is undocumented in 0.135; "auto_review" is the canonical value.
#
# Companion profile overlays (separate files; legacy [profiles.X] nesting
# was deprecated in v0.134.0; profiles now load via `codex -p <name>` from
# $CODEX_HOME/<name>.config.toml):
#   ~/.codex/writer.config.toml    -- `codex --profile writer`    (fast workspace-write)
#   ~/.codex/reviewer.config.toml  -- `codex --profile reviewer`  (read-only review)
#   ~/.codex/plan.config.toml      -- `codex --profile plan`      (read-only, hardest reasoning)
#   ~/.codex/guardian.config.toml  -- `codex --profile guardian`  (read-only fleet supervisor)
#
# Companion subagent definitions (invoked inside a session via /agent <name>):
#   ~/.codex/agents/guardian.toml  (supervisor; read-only; delegates edits)
#   ~/.codex/agents/writer.toml    (execution worker; workspace-write)
#   ~/.codex/agents/reviewer.toml  (read-only review pass)
#
# Shared Guardian persona lives at ~/.agents/agents/guardian.md and is consumed
# by the `orchestrate-agents` skill when supervising a tmux fleet.
#
# Validate any change to this file against the installed binary:
#   codex --strict-config exec --skip-git-repo-check "noop"
# ---------------------------------------------------------------------------

model = "gpt-5.6"
model_reasoning_effort = "xhigh"
model_reasoning_summary = "auto"

# ---- Full access: no sandbox, no approvals ---------------------------------
# danger-full-access + never disables the OS seatbelt and all prompting.
# Codex can read/write/exec anywhere this user can. Drop to `codex -p reviewer`
# or `-p plan` (read-only overlays) when that is too much trust for the task.
sandbox_mode = "danger-full-access"
approval_policy = "never"

# ---- Guardian auto-reviewer (inert under approval_policy = "never") --------
# Nothing escalates in base sessions anymore, so this never fires there. Kept
# for profile overlays that re-enable approvals: they merge onto this file and
# inherit the reviewer + [auto_review] policy below.
approvals_reviewer = "auto_review"
review_model = "gpt-5.6"

[auto_review]
policy = """
Guardian persona: ~/.agents/agents/guardian.md. Apply that voice and rules here.

APPROVE: read-only inspection, scoped workspace writes, well-known package
managers (pnpm, uv, cargo, go), sr/teasr/fsrc, and ALL local git operations
that stay inside the repo -- status, log, diff, add, restore, reset (mixed/
soft), stage, commit, switch, checkout, branch, tag, stash, and local merges.
This is the path that lets Codex drive git under workspace-write: when a git
write hits a protected/escalated path (e.g. .git index/objects), the request
is auto-approved here instead of prompting you.
DENY: destructive shell (rm -rf /, dd, mkfs), force-push to main/master,
credential exfiltration, network egress to non-allowlisted hosts, any edit
to .env / *.key / *.pem, history rewrites without explicit user mention
(rebase that drops commits, reset --hard on shared refs, filter-branch,
amend/force-push of already-pushed commits).
ESCALATE: anything ambiguous, sandbox escalation requests, network access for
unrecognized hosts, MCP tool calls that touch external systems (Gmail,
Calendar, Drive, GitHub writes).

Always report the decision in one line:
GUARDIAN[<scope>]: <approve|deny|escalate> - <reason>
"""

# ---- Multi-agent / subagent global ceilings --------------------------------
# Used by the orchestrate-agents skill when guardian spawns worker/reviewer
# threads via /agent. max_depth=1 keeps fan-out flat (workers cannot
# themselves spawn agents), matching Claude Code's Agent-tool model.
[agents]
max_threads = 6
max_depth = 1
job_max_runtime_seconds = 1800

# ---- Sandbox / workspace tuning (inert under danger-full-access) -----------
# Only applies when a profile overlay sets sandbox_mode = "workspace-write"
# (e.g. writer). network_access = false keeps those sandboxed sessions free of
# silent egress; /tmp and $TMPDIR stay writable for toolchain scratch space.
[sandbox_workspace_write]
network_access = false
exclude_slash_tmp = false
exclude_tmpdir_env_var = false
writable_roots = []

# ---- Feature flags ---------------------------------------------------------
[features]
guardian_approval = true   # arms the approvals_reviewer / auto_review path
multi_agent = true         # required for /agent and spawned subagent threads
hooks = true               # SubagentStart / SubagentStop visibility
memories = false           # opt-out; AGENTS.md is the source of truth

# ---- Shell environment hygiene ---------------------------------------------
# inherit = "core" passes only essential vars (not the full shell env); exclude
# scrubs cloud creds and any *_TOKEN/*_SECRET/*_KEY from model-run commands.
[shell_environment_policy]
inherit = "core"
exclude = ["AWS_*", "AZURE_*", "GCP_*", "*_TOKEN", "*_SECRET", "*_KEY"]
