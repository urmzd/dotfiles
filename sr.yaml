# sr configuration (v7)
# Full reference: https://github.com/urmzd/sr#configuration
# Run `sr migrate` for the full version-by-version migration guide.

# Tagging and signing.
git:
  tag_prefix: "v"
  floating_tag: true
  sign_tags: false
  v0_protection: true

# How commits are parsed and classified.
# The regex is derived automatically from the type names below.
commit:
  types:
    minor:
      - feat
    patch:
      - fix
      - perf
      - refactor
    none:
      - docs
      - revert
      - chore
      - ci
      - test
      - build
      - style

# Changelog generation.
changelog:
  file: CHANGELOG.md
  # groups:
  #   - name: breaking
  #     content: [breaking]
  #   - name: features
  #     content: [feat]
  #   - name: bug-fixes
  #     content: [fix]
  #   - name: performance
  #     content: [perf]
  #   - name: misc
  #     content: [chore, ci, test, build, style]

# Release channels for trunk-based promotion.
channels:
  default: stable
  branch: main
  content:
    - name: stable
  # - name: canary
  #   prerelease: canary
  # - name: rc
  #   prerelease: rc
  #   draft: true

# GitHub release metadata (optional).
# vcs:
#   github:
#     release_name_template: "{{ tag_name }}"

# Packages — one entry per release unit. For single-repo projects, use `path: .`.
# Monorepos add more entries with their own tag_prefix, version_files, etc.
packages:
  - path: .
    version_files: []
    stage_files: []
    artifacts: []
