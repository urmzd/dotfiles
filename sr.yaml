# sr configuration
# Full reference: https://github.com/urmzd/sr#configuration

# How commits are parsed and classified.
commit:
  # Regex for parsing conventional commits.
  # Required named groups: type, description. Optional: scope, breaking.
  pattern: '^(?P<type>\w+)(?:\((?P<scope>[^)]+)\))?(?P<breaking>!)?:\s+(?P<description>.+)'

  # Changelog section headings.
  breaking_section: Breaking Changes
  misc_section: Miscellaneous

  # Commit type definitions.
  types:
    - name: feat
      bump: minor
      section: Features
    - name: fix
      bump: patch
      section: Bug Fixes
    - name: perf
      bump: patch
      section: Performance
    - name: docs
      section: Documentation
    - name: refactor
      bump: patch
      section: Refactoring
    - name: revert
      section: Reverts
    - name: chore
    - name: ci
    - name: test
    - name: build
    - name: style

# How releases are cut.
release:
  branches:
    - main
  tag_prefix: "v"
  changelog:
    file: CHANGELOG.md
  version_files: []
  version_files_strict: false
  artifacts: []
  floating_tags: true
  stage_files: []
  sign_tags: false
  draft: false
  # prerelease: alpha
  # release_name_template: "{{ tag_name }}"

  # Release channels for trunk-based promotion.
  # channels:
