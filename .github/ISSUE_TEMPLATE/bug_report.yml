name: Bug report
description: Report a reproducible problem
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Fill in the fields below so we can reproduce and fix it quickly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened? What did you expect to happen?
      placeholder: A one-paragraph description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal steps to reproduce. Include commands, input, and config.
      placeholder: |
        1. Run `...`
        2. Observe `...`
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Version or commit SHA of the project.
      placeholder: "v1.2.3 or abc1234"
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, runtime version, relevant tool versions.
      placeholder: |
        - OS: macOS 14.5
        - Runtime: go 1.25.5
        - Shell: zsh 5.9
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Error messages, stack traces, or relevant log output.
      render: shell
    validations:
      required: false
