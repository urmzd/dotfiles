name: Feature request
description: Propose a new capability or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? Who is affected?
      placeholder: A clear description of the user-facing problem.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen? Describe the API, UX, or behavior.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider, and why were they not chosen?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to related issues, discussions, prior art, or mockups.
    validations:
      required: false
